<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <title>🌸 برنامج متابعة حفظ القرآن الكريم</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ======================================== */
    /* التصميم الأصلي - نسخة وردية كاملة */
    /* ======================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --pink-bg:      #FDE8F0;
      --pink-header:  #F4A7C3;
      --pink-dark:    #D4537E;
      --pink-light:   #FAD4E5;
      --pink-mid:     #F07AA0;
      --pink-btn:     #ED93B1;
      --blush:        #FBD0E2;
      --mauve:        #C97B9E;
      --gold:         #F5C842;
      --white:        #ffffff;
    }

    body {
      font-family: 'Amiri', serif;
      direction: rtl;
      background-color: var(--pink-bg);
      background-image: radial-gradient(circle, #FAC8DC 1.5px, transparent 1.5px);
      background-size: 35px 35px;
      min-height: 100vh;
      padding: 10px;
    }

    /* شاشة تسجيل الدخول */
    .auth-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--pink-bg);
      padding: 16px;
    }

    .auth-card {
      background: var(--white);
      padding: 2rem 1.5rem;
      border-radius: 32px;
      box-shadow: 0 20px 35px rgba(212, 83, 126, 0.15);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .auth-card h2 {
      color: var(--pink-dark);
      margin-bottom: 25px;
      font-size: 28px;
    }

    .auth-card input {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 30px;
      border: 1.5px solid var(--pink-header);
      font-family: 'Amiri', serif;
      font-size: 16px;
      background: #fff;
      outline: none;
    }

    .auth-card input:focus {
      border-color: var(--pink-dark);
      box-shadow: 0 0 0 3px rgba(212, 83, 126, 0.1);
    }

    .auth-card button {
      background: linear-gradient(135deg, var(--pink-dark), var(--pink-mid));
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 40px;
      margin: 8px 5px;
      cursor: pointer;
      font-family: 'Amiri', serif;
      font-size: 17px;
      font-weight: bold;
    }

    .auth-card button:active {
      transform: scale(0.96);
    }

    .auth-card button:last-child {
      background: var(--pink-header);
    }

    .auth-msg {
      color: #d9534f;
      margin-top: 15px;
      font-size: 13px;
    }

    /* التطبيق الرئيسي */
    .app-screen {
      display: none;
    }

    .wrapper {
      max-width: 100%;
      width: 100%;
      margin: 0 auto;
      padding: 0;
    }

    .title-bar {
      background: linear-gradient(135deg, #F4C0D1 0%, #FAC775 100%);
      border-radius: 20px;
      padding: 12px 15px;
      text-align: center;
      margin-bottom: 12px;
      border: 2px solid var(--pink-header);
      box-shadow: 0 6px 18px rgba(212, 83, 126, 0.12);
    }

    .title-bar h1 {
      font-size: clamp(18px, 5vw, 24px);
      color: #72243E;
      font-weight: 700;
      margin: 8px 0;
    }

    .title-bar p {
      font-size: clamp(12px, 3.5vw, 14px);
      color: #993556;
    }

    .deco-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      font-size: clamp(14px, 4vw, 20px);
      margin: 5px 0;
    }

    /* الإحصائيات */
    .stats-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--white);
      border: 1.5px solid var(--pink-header);
      border-radius: 16px;
      padding: 8px 12px;
      text-align: center;
      flex: 1;
      min-width: 70px;
      box-shadow: 0 2px 10px rgba(212, 83, 126, 0.08);
    }

    .stat-num {
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 700;
      color: var(--pink-dark);
    }

    .stat-lbl {
      font-size: clamp(9px, 2.5vw, 11px);
      color: var(--mauve);
      margin-top: 3px;
    }

    /* شريط التقدم */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.5);
      padding: 6px 12px;
      border-radius: 40px;
    }

    .progress-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--pink-dark);
      min-width: 42px;
    }

    .progress-bar {
      flex: 1;
      height: 10px;
      background: var(--blush);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--pink-header);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink-mid), var(--pink-dark));
      border-radius: 10px;
      width: 0%;
      transition: width 0.4s ease;
    }

    /* تبويبات الشهور */
    .month-tabs-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 12px;
      padding-bottom: 4px;
      scrollbar-width: thin;
    }

    .month-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: nowrap;
      min-width: max-content;
      padding: 2px;
    }

    .month-tab-btn {
      padding: 8px 18px;
      border-radius: 40px;
      border: 1.5px solid var(--pink-header);
      background: var(--white);
      color: #993556;
      font-family: 'Amiri', serif;
      font-size: clamp(12px, 3vw, 14px);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .month-tab-btn:active {
      transform: scale(0.96);
    }

    .month-tab-btn.active {
      background: linear-gradient(135deg, var(--pink-dark), var(--mauve));
      color: var(--white);
      border-color: var(--pink-dark);
      box-shadow: 0 3px 12px rgba(212, 83, 126, 0.35);
      font-weight: 700;
    }

    /* تبويبات الأيام */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 7px 16px;
      border-radius: 22px;
      border: 1.5px solid var(--pink-header);
      background: var(--white);
      color: #993556;
      font-family: 'Amiri', serif;
      font-size: clamp(12px, 2.5vw, 14px);
      cursor: pointer;
    }

    .tab-btn:active {
      transform: scale(0.96);
    }

    .tab-btn.active {
      background: var(--pink-dark);
      color: var(--white);
      border-color: var(--pink-dark);
      box-shadow: 0 3px 10px rgba(212, 83, 126, 0.3);
    }

    /* الجدول */
    .table-scroll {
      overflow-x: auto;
      border-radius: 16px;
      border: 1.5px solid var(--pink-header);
      box-shadow: 0 4px 16px rgba(212, 83, 126, 0.1);
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      min-width: 650px;
      border-collapse: collapse;
      font-size: clamp(11px, 3vw, 14px);
      background: var(--white);
    }

    thead tr {
      background: linear-gradient(135deg, var(--pink-header), var(--pink-mid));
    }

    thead th {
      padding: 10px 6px;
      font-weight: 700;
      color: var(--white);
      border: 1px solid var(--pink-btn);
      font-size: clamp(10px, 2.5vw, 13px);
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    tbody tr:nth-child(odd) {
      background: var(--blush);
    }

    tbody tr:nth-child(even) {
      background: #FDF0F5;
    }

    tbody tr:hover {
      background: var(--pink-light);
    }

    tbody td {
      padding: 8px 5px;
      border: 1px solid var(--pink-light);
      text-align: center;
      vertical-align: middle;
    }

    /* دائرة اليوم */
    .day-circle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--pink-dark);
      color: var(--white);
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(212, 83, 126, 0.25);
    }

    /* صناديق الاختيار */
    .check-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .checkbox-custom {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--pink-header);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
      transition: all 0.2s;
      font-size: 16px;
      color: transparent;
      user-select: none;
    }

    .checkbox-custom:active {
      transform: scale(0.92);
    }

    .checkbox-custom.checked {
      background: var(--pink-dark);
      border-color: var(--pink-dark);
      color: var(--white);
    }

    /* تقييم النجوم */
    .star-rating {
      display: flex;
      gap: 3px;
      justify-content: center;
      flex-wrap: nowrap;
    }

    .star {
      font-size: clamp(16px, 4.5vw, 20px);
      cursor: pointer;
      color: #E8D0DA;
      transition: transform 0.1s;
      user-select: none;
    }

    .star:active {
      transform: scale(1.2);
    }

    .star.filled {
      color: var(--gold);
    }

    /* Textareas */
    .wide-textarea,
    .notes-textarea {
      width: 100%;
      min-height: 38px;
      overflow: hidden;
      border: 1.5px solid var(--pink-light);
      border-radius: 12px;
      padding: 6px 8px;
      font-family: 'Amiri', serif;
      font-size: clamp(11px, 2.5vw, 13px);
      background: var(--white);
      color: #444;
      direction: rtl;
      resize: none;
      line-height: 1.5;
    }

    .wide-textarea:focus,
    .notes-textarea:focus {
      outline: none;
      border-color: var(--pink-dark);
      box-shadow: 0 0 0 3px rgba(212, 83, 126, 0.1);
    }

    .td-notes {
      min-width: 120px;
      width: 16%;
    }

    .td-wide {
      min-width: 110px;
      width: 13%;
    }

    /* حقل مع زر تم */
    .field-done-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }

    .done-row {
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: flex-end;
    }

    .done-check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--pink-header);
      background: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .done-check:active {
      transform: scale(0.92);
    }

    .done-check.done {
      background: var(--pink-dark);
      border-color: var(--pink-dark);
      color: var(--white);
    }

    .done-check.coffee-check {
      font-size: 16px;
      color: #c9a96e;
      border-color: #d4a96a;
      background: #fff8f0;
      width: 28px;
      height: 28px;
    }

    .done-check.coffee-check.done {
      background: linear-gradient(135deg, #7b4f2e, #c47d3a);
      border-color: #7b4f2e;
      color: var(--white);
    }

    .done-lbl {
      font-size: 10px;
      color: var(--mauve);
      cursor: pointer;
      user-select: none;
    }

    /* قائمة الأحزاب */
    .hizb-wrap {
      position: relative;
      min-width: 100px;
    }

    .hizb-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      padding: 6px 8px;
      border: 1.5px solid var(--pink-header);
      border-radius: 12px;
      background: var(--white);
      cursor: pointer;
      font-family: 'Amiri', serif;
      font-size: clamp(10px, 2.5vw, 12px);
      color: var(--mauve);
      text-align: right;
    }

    .hizb-selected {
      color: var(--pink-dark);
      font-weight: 700;
      font-size: clamp(9px, 2.5vw, 11px);
      flex: 1;
      text-align: right;
    }

    .hizb-panel {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      z-index: 999;
      background: var(--white);
      border: 1.5px solid var(--pink-header);
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(212, 83, 126, 0.2);
      width: min(320px, 85vw);
    }

    .hizb-panel.hidden {
      display: none;
    }

    .hizb-search {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-bottom: 1px solid var(--pink-light);
      font-family: 'Amiri', serif;
      font-size: 13px;
      direction: rtl;
      background: var(--blush);
      border-radius: 16px 16px 0 0;
      outline: none;
    }

    .hizb-list {
      list-style: none;
      max-height: 220px;
      overflow-y: auto;
      padding: 5px 0;
    }

    .hizb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 12px;
      color: var(--mauve);
      direction: rtl;
    }

    .hizb-item.selected {
      background: var(--pink-light);
      color: var(--pink-dark);
      font-weight: 700;
    }

    .hizb-chk {
      font-size: 14px;
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }

    /* لوحة المشرف */
    .admin-panel {
      background: var(--blush);
      padding: 12px;
      border-radius: 20px;
      margin-bottom: 15px;
      display: none;
    }

    .admin-panel select {
      width: 100%;
      padding: 10px;
      border-radius: 30px;
      font-family: 'Amiri', serif;
      font-size: 14px;
      border: 1px solid var(--pink-header);
      background: white;
    }

    /* التذييل */
    .bottom-deco {
      text-align: center;
      font-size: clamp(16px, 5vw, 24px);
      margin-top: 20px;
      letter-spacing: 6px;
      opacity: 0.7;
    }

    /* زر الخروج */
    .logout-btn {
      background: var(--pink-dark);
      color: white;
      border: none;
      padding: 8px 25px;
      border-radius: 30px;
      cursor: pointer;
      font-family: 'Amiri', serif;
      font-size: 14px;
      margin-top: 15px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    /* استجابة للشاشات الصغيرة */
    @media (max-width: 550px) {
      body {
        padding: 6px;
      }
      .stat-card {
        padding: 5px 8px;
        min-width: 60px;
      }
      .stat-num {
        font-size: 14px;
      }
      .stat-lbl {
        font-size: 8px;
      }
      .tab-btn {
        padding: 6px 12px;
      }
      .day-circle {
        width: 28px;
        height: 28px;
        font-size: 12px;
      }
      .done-lbl {
        display: none;
      }
    }
  </style>
</head>
<body>

<!-- ==================== شاشة تسجيل الدخول ==================== -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div style="font-size: 48px; margin-bottom: 10px;">🌸</div>
    <h2>تسجيل الدخول</h2>
    <input type="email" id="loginEmail" placeholder="📧 البريد الإلكتروني">
    <input type="password" id="loginPassword" placeholder="🔒 كلمة المرور">
    <button id="loginBtn">✨ دخول</button>
    <button id="signupBtn">🆕 إنشاء حساب</button>
    <div id="authMsg" class="auth-msg"></div>
  </div>
</div>

<!-- ==================== التطبيق الرئيسي ==================== -->
<div id="appScreen" class="app-screen">
  <div class="wrapper">
    <div class="title-bar">
      <div class="deco-row">🎀 ✨ 🎀 ✨ 🎀</div>
      <h1>🌸 برنامج متابعة حفظ القرآن الكريم 🌸</h1>
      <p>سجّلي تقدمك يوماً بيوم بإذن الله 💕</p>
      <div class="deco-row">🦋 🌷 💖 🌷 🦋</div>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="progress-wrap">
      <span class="progress-label" id="progressLabel">0%</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- لوحة المشرف (تظهر فقط للمشرف) -->
    <div id="adminPanel" class="admin-panel">
      <h3 style="color: var(--pink-dark); margin-bottom: 8px;">👩‍🏫 لوحة المشرف</h3>
      <select id="studentSelect">
        <option value="">-- اختر طالباً --</option>
      </select>
      <div id="adminMsg" style="margin-top: 8px; color: var(--pink-dark); font-size: 12px;"></div>
      <button id="logoutBtnAdmin" class="logout-btn" style="margin-top: 10px;">🚪 تسجيل خروج</button>
    </div>

    <!-- تبويبات الشهور -->
    <div class="month-tabs-wrap">
      <div class="month-tabs" id="monthTabs"></div>
    </div>

    <!-- تبويبات الأيام -->
    <div class="tabs" id="tabs"></div>

    <!-- الجدول -->
    <div class="table-scroll">
      <table id="mainTable">
        <thead>
          <tr>
            <th>اليوم</th>
            <th>🕌 الحفظ</th>
            <th>📖 المراجعة القريبة</th>
            <th>📚 المراجعة البعيدة</th>
            <th>📝 المراجعة العامة</th>
            <th>✏️ ملاحظات التجويد</th>
            <th>⭐ تقييم التجويد</th>
            <th>🎧 سماع الشيخ</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
       </table>
    </div>

    <div class="bottom-deco">🎀 🌸 💝 🌸 🎀 🌸 💝 🌸 🎀</div>

    <button id="logoutMainBtn" class="logout-btn" style="margin-top: 15px;">🚪 تسجيل خروج</button>
  </div>
</div>

<script type="module">

  // ============================================================

  async function loadDataFromFirebase(userId) {
    if (!userId) return {};
    try {
      const docRef = doc(db, "students", userId);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        return docSnap.data().trackingData || {};
      }
      return {};
    } catch (e) {
      console.error("خطأ في التحميل:", e);
      return {};
    }
  }

  async function saveDataToFirebase(userId, newData) {
    if (!userId) return;
    try {
      const docRef = doc(db, "students", userId);
      await setDoc(docRef, { trackingData: newData, email: currentUserEmail }, { merge: true });
    } catch (e) {
      console.error("خطأ في الحفظ:", e);
    }
  }

  async function loadAllStudents() {
    if (!isAdmin) return [];
    try {
      const querySnapshot = await getDocs(collection(db, "students"));
      const students = [];
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        students.push({
          id: doc.id,
          email: data.email || doc.id,
          trackingData: data.trackingData || {}
        });
      });
      return students;
    } catch (e) {
      console.error("خطأ في جلب الطلاب:", e);
      return [];
    }
  }

  function getVal(month, day, col) {
    const key = `m${month}_d${day}_${col}`;
    return data[key] || '';
  }

  async function setVal(month, day, col, val) {
    const key = `m${month}_d${day}_${col}`;
    if (data[key] === val) return;
    data[key] = val;
    const userId = viewingStudentId || currentUserId;
    if (userId) {
      await saveDataToFirebase(userId, data);
    }
    renderTable();
    updateStats();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function makeCheckbox(month, day, col) {
    const wrap = document.createElement('div');
    wrap.className = 'check-wrap';
    const box = document.createElement('div');
    box.className = 'checkbox-custom' + (getVal(month, day, col) === '1' ? ' checked' : '');
    box.textContent = getVal(month, day, col) === '1' ? '💗' : '';
    box.addEventListener('click', async () => {
      const checked = box.classList.toggle('checked');
      box.textContent = checked ? '💗' : '';
      await setVal(month, day, col, checked ? '1' : '');
    });
    wrap.appendChild(box);
    return wrap;
  }

  function makeStars(month, day, col) {
    const wrap = document.createElement('div');
    wrap.className = 'star-rating';
    const current = parseInt(getVal(month, day, col)) || 0;
    for (let i = 1; i <= 5; i++) {
      const star = document.createElement('span');
      star.className = 'star' + (i <= current ? ' filled' : '');
      star.textContent = '★';
      star.addEventListener('click', async () => {
        await setVal(month, day, col, String(i));
        const allStars = wrap.querySelectorAll('.star');
        allStars.forEach((s, idx) => s.classList.toggle('filled', idx < i));
      });
      wrap.appendChild(star);
    }
    return wrap;
  }

  function makeHizbSelect(month, day, col) {
    const savedRaw = getVal(month, day, col);
    const saved = savedRaw ? JSON.parse(savedRaw) : [];
    const wrap = document.createElement('div');
    wrap.className = 'hizb-wrap';
    const btn = document.createElement('button');
    btn.className = 'hizb-btn';
    btn.type = 'button';
    
    function updateBtnLabel() {
      const currentVals = getVal(month, day, col) ? JSON.parse(getVal(month, day, col)) : [];
      if (currentVals.length === 0) {
        btn.innerHTML = '<span class="hizb-placeholder">اختاري الحزب 🌸</span><span class="hizb-arrow">▼</span>';
      } else {
        const nums = currentVals.map(i => AHZAB[i].match(/الحزب\s+[\d٠-٩]+/)[0]).join(' + ');
        btn.innerHTML = `<span class="hizb-selected">${nums}</span><span class="hizb-arrow">▼</span>`;
      }
    }
    updateBtnLabel();
    
    const panel = document.createElement('div');
    panel.className = 'hizb-panel hidden';
    const search = document.createElement('input');
    search.type = 'text';
    search.className = 'hizb-search';
    search.placeholder = '🔍 ابحثي...';
    panel.appendChild(search);
    const list = document.createElement('ul');
    list.className = 'hizb-list';
    
    function buildList(filter = '') {
      list.innerHTML = '';
      AHZAB.forEach((hizb, idx) => {
        if (filter && !hizb.includes(filter)) return;
        const currentVals = getVal(month, day, col) ? JSON.parse(getVal(month, day, col)) : [];
        const li = document.createElement('li');
        li.className = 'hizb-item' + (currentVals.includes(idx) ? ' selected' : '');
        const chk = document.createElement('span');
        chk.className = 'hizb-chk';
        chk.textContent = currentVals.includes(idx) ? '💗' : '○';
        const lbl = document.createElement('span');
        lbl.textContent = hizb;
        li.appendChild(chk);
        li.appendChild(lbl);
        li.addEventListener('click', async () => {
          let vals = getVal(month, day, col) ? JSON.parse(getVal(month, day, col)) : [];
          if (vals.includes(idx)) {
            vals = vals.filter(v => v !== idx);
          } else {
            vals.push(idx);
            vals.sort((a, b) => a - b);
          }
          await setVal(month, day, col, JSON.stringify(vals));
          buildList(search.value);
          updateBtnLabel();
        });
        list.appendChild(li);
      });
    }
    buildList();
    search.addEventListener('input', () => buildList(search.value));
    panel.appendChild(list);
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = !panel.classList.contains('hidden');
      document.querySelectorAll('.hizb-panel').forEach(p => p.classList.add('hidden'));
      if (!isOpen) panel.classList.remove('hidden');
    });
    document.addEventListener('click', () => panel.classList.add('hidden'));
    panel.addEventListener('click', e => e.stopPropagation());
    wrap.appendChild(btn);
    wrap.appendChild(panel);
    return wrap;
  }

  function makeFieldWithDone(month, day, fieldCol, doneCol, type, placeholder) {
    const wrap = document.createElement('div');
    wrap.className = 'field-done-wrap';
    let field;
    if (type === 'textarea' || type === 'notes') {
      field = document.createElement('textarea');
      field.className = type === 'notes' ? 'notes-textarea' : 'wide-textarea';
      field.placeholder = placeholder;
      field.value = getVal(month, day, fieldCol);
      field.rows = 1;
      field.addEventListener('input', async () => {
        await setVal(month, day, fieldCol, field.value);
        autoResize(field);
      });
      requestAnimationFrame(() => autoResize(field));
    } else if (type === 'hizb') {
      field = makeHizbSelect(month, day, fieldCol);
    }
    const doneRow = document.createElement('div');
    doneRow.className = 'done-row';
    const isHafiz = doneCol === 'hafiz_done';
    const doneBox = document.createElement('div');
    const isDone = getVal(month, day, doneCol) === '1';
    doneBox.className = 'done-check' + (isHafiz ? ' coffee-check' : '') + (isDone ? ' done' : '');
    doneBox.textContent = isDone ? (isHafiz ? '☕' : '✓') : (isHafiz ? '🤍' : '');
    doneBox.title = isHafiz ? 'كوباية قهوة لما تخلصي الحفظ ☕' : 'اضغطي للتأكيد على الإتمام';
    const doneLbl = document.createElement('span');
    doneLbl.className = 'done-lbl';
    doneLbl.textContent = 'تم ✅';
    doneBox.addEventListener('click', async () => {
      const nowDone = doneBox.classList.toggle('done');
      doneBox.textContent = nowDone ? (isHafiz ? '☕' : '✓') : (isHafiz ? '🤍' : '');
      await setVal(month, day, doneCol, nowDone ? '1' : '');
    });
    doneLbl.addEventListener('click', () => doneBox.click());
    doneRow.appendChild(doneBox);
    doneRow.appendChild(doneLbl);
    wrap.appendChild(field);
    wrap.appendChild(doneRow);
    return wrap;
  }

  function getPagesForMonth(totalDays) {
    const pages = [];
    pages.push({ label: '🌸 الأيام ١–١٠', start: 1, end: 10 });
    pages.push({ label: '💕 الأيام ١١–٢٠', start: 11, end: 20 });
    const endLabel = totalDays === 30 ? '٣٠' : '٢٩';
    pages.push({ label: `🎀 الأيام ٢١–${endLabel}`, start: 21, end: totalDays });
    return pages;
  }

  function renderMonthTabs() {
    const container = document.getElementById('monthTabs');
    if (!container) return;
    container.innerHTML = '';
    MONTHS.forEach((m, idx) => {
      const btn = document.createElement('button');
      btn.className = 'month-tab-btn' + (idx === currentMonth ? ' active' : '');
      btn.innerHTML = `${m.emoji} ${m.name}`;
      btn.addEventListener('click', () => {
        currentMonth = idx;
        currentPage = 0;
        renderMonthTabs();
        renderPageTabs();
        renderTable();
      });
      container.appendChild(btn);
    });
  }

  function renderPageTabs() {
    const container = document.getElementById('tabs');
    if (!container) return;
    container.innerHTML = '';
    const pages = getPagesForMonth(MONTHS[currentMonth].days);
    pages.forEach((page, idx) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (idx === currentPage ? ' active' : '');
      btn.textContent = page.label;
      btn.addEventListener('click', () => {
        currentPage = idx;
        renderPageTabs();
        renderTable();
      });
      container.appendChild(btn);
    });
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    if (!tbody) return;
    tbody.innerHTML = '';
    const pages = getPagesForMonth(MONTHS[currentMonth].days);
    const { start, end } = pages[currentPage];
    for (let day = start; day <= end; day++) {
      const tr = document.createElement('tr');
      
      const tdDay = document.createElement('td');
      const circle = document.createElement('div');
      circle.className = 'day-circle';
      circle.textContent = day;
      tdDay.appendChild(circle);
      tr.appendChild(tdDay);
      
      const tdHafiz = document.createElement('td');
      tdHafiz.classList.add('td-wide');
      tdHafiz.appendChild(makeFieldWithDone(currentMonth, day, 'hafiz', 'hafiz_done', 'textarea', 'اكتبي ما حفظتِه... 🌸'));
      tr.appendChild(tdHafiz);
      
      const tdRevClose = document.createElement('td');
      tdRevClose.appendChild(makeCheckbox(currentMonth, day, 'rev_close'));
      tr.appendChild(tdRevClose);
      
      const tdRevFar = document.createElement('td');
      tdRevFar.classList.add('td-wide');
      tdRevFar.appendChild(makeFieldWithDone(currentMonth, day, 'hizb', 'hizb_done', 'hizb', ''));
      tr.appendChild(tdRevFar);
      
      const tdRevGen = document.createElement('td');
      tdRevGen.classList.add('td-wide');
      tdRevGen.appendChild(makeFieldWithDone(currentMonth, day, 'rev_gen', 'rev_gen_done', 'textarea', 'اكتبي ملاحظات المراجعة... 💕'));
      tr.appendChild(tdRevGen);
      
      const tdNotes = document.createElement('td');
      tdNotes.classList.add('td-notes');
      tdNotes.appendChild(makeFieldWithDone(currentMonth, day, 'notes', 'notes_done', 'notes', 'اكتبي ملاحظات التجويد... ✏️'));
      tr.appendChild(tdNotes);
      
      const tdStars = document.createElement('td');
      tdStars.appendChild(makeStars(currentMonth, day, 'stars'));
      tr.appendChild(tdStars);
      
      const tdSheikh = document.createElement('td');
      tdSheikh.appendChild(makeCheckbox(currentMonth, day, 'sheikh'));
      tr.appendChild(tdSheikh);
      
      tbody.appendChild(tr);
    }
  }

  function updateStats() {
    let done = 0, total = 0, starsSum = 0, starsCount = 0;
    MONTHS.forEach((m, mIdx) => {
      for (let day = 1; day <= m.days; day++) {
        ['rev_close', 'sheikh'].forEach(col => {
          total++;
          if (getVal(mIdx, day, col) === '1') done++;
        });
        const s = parseInt(getVal(mIdx, day, 'stars'));
        if (s > 0) { starsSum += s; starsCount++; }
      }
    });
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    const avgStr = starsCount > 0 ? (starsSum / starsCount).toFixed(1) : '—';
    
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    if (progressFill) progressFill.style.width = pct + '%';
    if (progressLabel) progressLabel.textContent = pct + '%';
    
    let mDone = 0, mTotal = 0;
    const m = MONTHS[currentMonth];
    for (let day = 1; day <= m.days; day++) {
      ['rev_close', 'sheikh'].forEach(col => {
        mTotal++;
        if (getVal(currentMonth, day, col) === '1') mDone++;
      });
    }
    const mPct = mTotal > 0 ? Math.round((mDone / mTotal) * 100) : 0;
    
    const statsRow = document.getElementById('statsRow');
    if (statsRow) {
      statsRow.innerHTML = `
        <div class="stat-card"><div class="stat-num">🌟 ${done}</div><div class="stat-lbl">إجمالي الإنجاز</div></div>
        <div class="stat-card"><div class="stat-num">💖 ${pct}%</div><div class="stat-lbl">نسبة السنة</div></div>
        <div class="stat-card"><div class="stat-num">📅 ${mPct}%</div><div class="stat-lbl">نسبة الشهر</div></div>
        <div class="stat-card"><div class="stat-num">⭐ ${avgStr}</div><div class="stat-lbl">متوسط التجويد</div></div>
      `;
    }
  }

  async function showStudentView(userId, email) {
    currentUserId = userId;
    currentUserEmail = email;
    isAdmin = false;
    viewingStudentId = null;
    
    const userData = await loadDataFromFirebase(userId);
    data = userData;
    
    const adminPanel = document.getElementById('adminPanel');
    if (adminPanel) adminPanel.style.display = 'none';
    
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    
    currentMonth = 0;
    currentPage = 0;
    renderMonthTabs();
    renderPageTabs();
    renderTable();
    updateStats();
  }

  async function showAdminView() {
    isAdmin = true;
    currentUserId = null;
    
    allStudents = await loadAllStudents();
    
    const adminPanel = document.getElementById('adminPanel');
    if (adminPanel) adminPanel.style.display = 'block';
    
    const studentSelect = document.getElementById('studentSelect');
    if (studentSelect) {
      studentSelect.innerHTML = '<option value="">-- اختر طالباً --</option>';
      allStudents.forEach(s => {
        const option = document.createElement('option');
        option.value = s.id;
        option.textContent = s.email;
        studentSelect.appendChild(option);
      });
      studentSelect.onchange = async () => {
        const selectedId = studentSelect.value;
        if (selectedId) {
          const student = allStudents.find(s => s.id === selectedId);
          if (student) {
            viewingStudentId = selectedId;
            data = student.trackingData || {};
            currentMonth = 0;
            currentPage = 0;
            renderMonthTabs();
            renderPageTabs();
            renderTable();
            updateStats();
            const adminMsg = document.getElementById('adminMsg');
            if (adminMsg) adminMsg.innerHTML = `👩‍🏫 تعرض الآن بيانات: ${student.email}`;
          }
        }
      };
    }
    
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
  }

      };
    }
    
    if (signupBtn) {
      signupBtn.onclick = async () => {
        if (loginPassword.value.length < 6) {
          authMsg.textContent = '⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل';
          return;
        }
        try {
          await createUserWithEmailAndPassword(auth, loginEmail.value, loginPassword.value);
          authMsg.textContent = '✅ تم إنشاء الحساب بنجاح!';
        } catch (e) {
          authMsg.textContent = '⚠️ ' + e.message;
        }
      };
    }
    
    if (logoutMainBtn) {
      logoutMainBtn.onclick = () => signOut(auth);
    }
    
    if (logoutBtnAdmin) {
      logoutBtnAdmin.onclick = () => signOut(auth);
    }
    
    onAuthStateChanged(auth, onAuthChange);
  });
</script>
</body>
</html>
