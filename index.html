<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <title>🌸 برنامج متابعة حفظ القرآن الكريم</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* جميع التصاميم كما هي بدون تغيير */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root { --pink-bg: #FDE8F0; --pink-header: #F4A7C3; --pink-dark: #D4537E; --pink-light: #FAD4E5; --pink-mid: #F07AA0; --blush: #FBD0E2; --mauve: #C97B9E; --gold: #F5C842; --white: #ffffff; }
    body { font-family: 'Amiri', serif; direction: rtl; background-color: var(--pink-bg); background-image: radial-gradient(circle, #FAC8DC 1.5px, transparent 1.5px); background-size: 35px 35px; min-height: 100vh; padding: 10px; }
    .auth-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--pink-bg); padding: 16px; }
    .auth-card { background: var(--white); padding: 2rem 1.5rem; border-radius: 32px; box-shadow: 0 20px 35px rgba(212,83,126,0.15); width: 100%; max-width: 400px; text-align: center; }
    .auth-card h2 { color: var(--pink-dark); margin-bottom: 25px; font-size: 28px; }
    .auth-card input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 30px; border: 1.5px solid var(--pink-header); font-family: 'Amiri'; font-size: 16px; background: #fff; outline: none; }
    .auth-card button { background: linear-gradient(135deg, var(--pink-dark), var(--pink-mid)); color: white; border: none; padding: 12px 25px; border-radius: 40px; margin: 8px 5px; cursor: pointer; font-family: 'Amiri'; font-size: 17px; font-weight: bold; }
    .auth-card button:last-child { background: var(--pink-header); }
    .auth-msg { color: #d9534f; margin-top: 15px; font-size: 13px; }
    .app-screen { display: none; }
    .wrapper { max-width: 100%; margin: 0 auto; }
    .title-bar { background: linear-gradient(135deg, #F4C0D1 0%, #FAC775 100%); border-radius: 20px; padding: 12px 15px; text-align: center; margin-bottom: 12px; border: 2px solid var(--pink-header); }
    .title-bar h1 { font-size: clamp(18px,5vw,24px); color: #72243E; }
    .title-bar p { font-size: clamp(12px,3.5vw,14px); color: #993556; }
    .deco-row { display: flex; justify-content: center; gap: 6px; font-size: clamp(14px,4vw,20px); margin: 5px 0; }
    .stats-row { display: flex; gap: 8px; margin-bottom: 12px; justify-content: center; flex-wrap: wrap; }
    .stat-card { background: var(--white); border: 1.5px solid var(--pink-header); border-radius: 16px; padding: 8px 12px; text-align: center; flex: 1; min-width: 70px; }
    .stat-num { font-size: clamp(16px,4vw,22px); font-weight: 700; color: var(--pink-dark); }
    .stat-lbl { font-size: clamp(9px,2.5vw,11px); color: var(--mauve); }
    .progress-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; background: rgba(255,255,255,0.5); padding: 6px 12px; border-radius: 40px; }
    .progress-label { font-size: 13px; font-weight: 700; color: var(--pink-dark); min-width: 42px; }
    .progress-bar { flex: 1; height: 10px; background: var(--blush); border-radius: 10px; overflow: hidden; border: 1px solid var(--pink-header); }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--pink-mid), var(--pink-dark)); width: 0%; transition: width 0.4s ease; }
    .month-tabs-wrap { overflow-x: auto; margin-bottom: 12px; }
    .month-tabs { display: flex; gap: 8px; flex-wrap: nowrap; min-width: max-content; }
    .month-tab-btn { padding: 8px 18px; border-radius: 40px; border: 1.5px solid var(--pink-header); background: var(--white); color: #993556; font-family: 'Amiri'; cursor: pointer; white-space: nowrap; }
    .month-tab-btn.active { background: linear-gradient(135deg, var(--pink-dark), var(--mauve)); color: white; }
    .tabs { display: flex; gap: 6px; margin-bottom: 12px; justify-content: center; flex-wrap: wrap; }
    .tab-btn { padding: 7px 16px; border-radius: 22px; border: 1.5px solid var(--pink-header); background: var(--white); color: #993556; font-family: 'Amiri'; cursor: pointer; }
    .tab-btn.active { background: var(--pink-dark); color: white; }
    .table-scroll { overflow-x: auto; border-radius: 16px; border: 1.5px solid var(--pink-header); }
    table { width: 100%; min-width: 650px; border-collapse: collapse; background: var(--white); }
    thead tr { background: linear-gradient(135deg, var(--pink-header), var(--pink-mid)); }
    thead th { padding: 10px 6px; color: white; border: 1px solid var(--pink-btn); white-space: nowrap; }
    tbody tr:nth-child(odd) { background: var(--blush); }
    tbody td { padding: 8px 5px; border: 1px solid var(--pink-light); text-align: center; vertical-align: middle; }
    .day-circle { width: 32px; height: 32px; border-radius: 50%; background: var(--pink-dark); color: white; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
    .check-wrap { display: flex; justify-content: center; align-items: center; }
    .checkbox-custom { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--pink-header); cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; }
    .checkbox-custom.checked { background: var(--pink-dark); color: white; }
    .star-rating { display: flex; gap: 3px; justify-content: center; }
    .star { font-size: 20px; cursor: pointer; color: #E8D0DA; }
    .star.filled { color: var(--gold); }
    .wide-textarea, .notes-textarea { width: 100%; min-height: 38px; border: 1.5px solid var(--pink-light); border-radius: 12px; padding: 6px 8px; font-family: 'Amiri'; background: white; resize: vertical; }
    .td-notes { min-width: 120px; width: 16%; }
    .td-wide { min-width: 110px; width: 13%; }
    .field-done-wrap { display: flex; flex-direction: column; gap: 6px; width: 100%; }
    .done-row { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
    .done-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--pink-header); cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; }
    .done-check.done { background: var(--pink-dark); color: white; }
    .done-check.coffee-check { background: #fff8f0; border-color: #d4a96a; }
    .done-check.coffee-check.done { background: linear-gradient(135deg, #7b4f2e, #c47d3a); color: white; }
    .done-lbl { font-size: 10px; color: var(--mauve); cursor: pointer; }
    .hizb-wrap { position: relative; min-width: 100px; }
    .hizb-btn { width: 100%; display: flex; justify-content: space-between; padding: 6px 8px; border: 1.5px solid var(--pink-header); border-radius: 12px; background: white; cursor: pointer; }
    .hizb-panel { position: absolute; top: 100%; right: 0; z-index: 999; background: white; border: 1.5px solid var(--pink-header); border-radius: 16px; width: min(320px, 85vw); }
    .hizb-panel.hidden { display: none; }
    .hizb-search { width: 100%; padding: 10px; border-bottom: 1px solid var(--pink-light); background: var(--blush); border-radius: 16px 16px 0 0; }
    .hizb-list { list-style: none; max-height: 220px; overflow-y: auto; }
    .hizb-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; }
    .hizb-item.selected { background: var(--pink-light); }
    .admin-panel { background: var(--blush); padding: 12px; border-radius: 20px; margin-bottom: 15px; display: none; }
    .admin-panel select { width: 100%; padding: 10px; border-radius: 30px; font-family: 'Amiri'; border: 1px solid var(--pink-header); }
    .bottom-deco { text-align: center; margin-top: 20px; }
    .logout-btn { background: var(--pink-dark); color: white; border: none; padding: 8px 25px; border-radius: 30px; cursor: pointer; margin-top: 15px; display: block; margin-left: auto; margin-right: auto; }
    .welcome-header { background: white; border-radius: 20px; padding: 10px 15px; margin-bottom: 12px; text-align: center; border: 1.5px solid var(--pink-header); }
    @media (max-width: 550px) { .stat-card { padding: 5px 8px; min-width: 60px; } .stat-num { font-size: 14px; } .done-lbl { display: none; } }
  </style>
</head>
<body>

<!-- ==================== شاشة تسجيل الدخول ==================== -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div style="font-size: 48px;">🌸</div>
    <h2>تسجيل الدخول</h2>
    <input type="text" id="signupName" placeholder="👤 الاسم (للحساب الجديد)">
    <input type="email" id="loginEmail" placeholder="📧 البريد الإلكتروني">
    <input type="password" id="loginPassword" placeholder="🔒 كلمة المرور">
    <button id="signupBtn">🆕 إنشاء حساب</button>
    <button id="loginBtn">✨ دخول</button>
    <div id="authMsg" class="auth-msg"></div>
  </div>
</div>

<!-- ==================== التطبيق الرئيسي ==================== -->
<div id="appScreen" class="app-screen">
  <div class="wrapper">
    <div class="title-bar">
      <div class="deco-row">🎀 ✨ 🎀 ✨ 🎀</div>
      <h1>🌸 برنامج متابعة حفظ القرآن الكريم 🌸</h1>
      <p>سجّلي تقدمك يوماً بيوم بإذن الله 💕</p>
      <div class="deco-row">🦋 🌷 💖 🌷 🦋</div>
    </div>

    <div class="welcome-header" id="welcomeHeader">
      <span>🌸 مرحباً بكِ، <span id="userNameDisplay">...</span> 🌸</span>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="progress-wrap">
      <span class="progress-label" id="progressLabel">0%</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div id="adminPanel" class="admin-panel">
      <h3 style="color: var(--pink-dark);">👩‍🏫 لوحة المشرف</h3>
      <select id="studentSelect"><option value="">-- اختر طالباً --</option></select>
      <div id="adminMsg"></div>
      <button id="logoutBtnAdmin" class="logout-btn">🚪 تسجيل خروج</button>
    </div>

    <div class="month-tabs-wrap"><div class="month-tabs" id="monthTabs"></div></div>
    <div class="tabs" id="tabs"></div>

    <div class="table-scroll">
      <table>
        <thead><tr><th>اليوم</th><th>🕌 الحفظ</th><th>📖 قريبة</th><th>📚 بعيدة</th><th>📝 عامة</th><th>✏️ تجويد</th><th>⭐ التقييم</th><th>🎧 الشيخ</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="bottom-deco">🎀 🌸 💝 🌸 🎀</div>
    <button id="logoutMainBtn" class="logout-btn">🚪 تسجيل خروج</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, collection, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB05Tm0hfd1-RAiLzy0HwKSBFPIvDJqUJY",
    authDomain: "quran-tracker-918f1.firebaseapp.com",
    projectId: "quran-tracker-918f1",
    storageBucket: "quran-tracker-918f1.firebasestorage.app",
    messagingSenderId: "339579551055",
    appId: "1:339579551055:web:dffc513af8b75a0005d93a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // بيانات الأحزاب (60)
  const AHZAB = [
    'الحزب 1 — الفاتحة', 'الحزب 2 — البقرة: أفتطمعون', 'الحزب 3 — البقرة: سيقول السفهاء',
    'الحزب 4 — البقرة: واذكروا الله', 'الحزب 5 — البقرة: تلك الرسل', 'الحزب 6 — آل عمران: قل أؤنبئكم',
    'الحزب 7 — آل عمران: كل الطعام', 'الحزب 8 — آل عمران: يستبشرون', 'الحزب 9 — النساء: والمحصنات',
    'الحزب 10 — النساء: فما لكم', 'الحزب 11 — النساء: لا يحب الله', 'الحزب 12 — المائدة: واتل عليهم',
    'الحزب 13 — المائدة: لتجدن', 'الحزب 14 — الأنعام: إنما يستجيب', 'الحزب 15 — الأنعام: ولو أننا',
    'الحزب 16 — الأعراف: المص', 'الحزب 17 — الأعراف: قال الملأ', 'الحزب 18 — الأعراف: وإذ نتقنا',
    'الحزب 19 — الأنفال: واعلموا', 'الحزب 20 — التوبة: يا أيها', 'الحزب 21 — التوبة: إنما السبيل',
    'الحزب 22 — يونس: للذين أحسنوا', 'الحزب 23 — هود: وما من دابة', 'الحزب 24 — هود: وإلى مدين',
    'الحزب 25 — يوسف: وما أبرئ', 'الحزب 26 — الرعد: أفمن يعلم', 'الحزب 27 — الحجر: الر تلك',
    'الحزب 28 — النحل: وقال الله', 'الحزب 29 — الإسراء: سبحان', 'الحزب 30 — الإسراء: أولم يروا',
    'الحزب 31 — الكهف: قال ألم', 'الحزب 32 — طه: طه', 'الحزب 33 — الأنبياء: اقترب',
    'الحزب 34 — الحج: يا أيها', 'الحزب 35 — المؤمنون: قد أفلح', 'الحزب 36 — النور: يا أيها',
    'الحزب 37 — الفرقان: وقال', 'الحزب 38 — الشعراء: قالوا', 'الحزب 39 — النمل: فما كان',
    'الحزب 40 — القصص: ولقد وصلنا', 'الحزب 41 — العنكبوت: ولا تجادلوا', 'الحزب 42 — لقمان: ومن يسلم',
    'الحزب 43 — الأحزاب: ومن يقنت', 'الحزب 44 — سبأ: قل من', 'الحزب 45 — يس: وما أنزلنا',
    'الحزب 46 — الصافات: فنبذناه', 'الحزب 47 — الزمر: فمن أظلم', 'الحزب 48 — غافر: ويا قوم',
    'الحزب 49 — فصلت: إليه يرد', 'الحزب 50 — الزخرف: قال أولو', 'الحزب 51 — الأحقاف: حم',
    'الحزب 52 — الفتح: لقد رضي', 'الحزب 53 — الذاريات: قال فما', 'الحزب 54 — الرحمن: الرحمن',
    'الحزب 55 — المجادلة: قد سمع', 'الحزب 56 — الجمعة: يسبح', 'الحزب 57 — الملك: تبارك',
    'الحزب 58 — الجن: قل أوحي', 'الحزب 59 — النبأ: عم', 'الحزب 60 — الأعلى: سبح'
  ];

  const MONTHS = [
    { name: 'ذو القعدة', emoji: '🌙', days: 30 }, { name: 'ذو الحجة', emoji: '🕌', days: 30 },
    { name: 'محرم', emoji: '🌟', days: 30 }, { name: 'صفر', emoji: '🌸', days: 29 },
    { name: 'ربيع الأول', emoji: '🌺', days: 30 }, { name: 'ربيع الثاني', emoji: '🌷', days: 29 },
    { name: 'جمادى الأولى', emoji: '💕', days: 30 }, { name: 'جمادى الثانية', emoji: '🎀', days: 29 },
    { name: 'رجب', emoji: '✨', days: 30 }, { name: 'شعبان', emoji: '💫', days: 29 },
    { name: 'رمضان', emoji: '🌙', days: 30 }, { name: 'شوال', emoji: '🎉', days: 29 }
  ];

  let currentMonth = 0, currentPage = 0, currentUserId = null, currentUserName = null, isAdmin = false, viewingStudentId = null, data = {};

  async function saveNameToFirestore(userId, name) {
    if (!userId) return;
    const docRef = doc(db, "students", userId);
    await setDoc(docRef, { name: name, email: auth.currentUser?.email }, { merge: true });
  }

  async function getUserName(userId) {
    try {
      const docRef = doc(db, "students", userId);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) return docSnap.data().name || docSnap.data().email || userId;
      return userId;
    } catch(e) { return userId; }
  }

  async function loadDataFromFirebase(userId) {
    if (!userId) return {};
    try {
      const docRef = doc(db, "students", userId);
      const docSnap = await getDoc(docRef);
      return docSnap.exists() ? (docSnap.data().trackingData || {}) : {};
    } catch(e) { return {}; }
  }

  async function saveDataToFirebase(userId, newData) {
    if (!userId) return;
    const docRef = doc(db, "students", userId);
    await setDoc(docRef, { trackingData: newData, email: auth.currentUser?.email, name: currentUserName }, { merge: true });
  }

  async function loadAllStudents() {
    if (!isAdmin) return [];
    const querySnapshot = await getDocs(collection(db, "students"));
    const students = [];
    querySnapshot.forEach((doc) => {
      const d = doc.data();
      students.push({ id: doc.id, name: d.name || d.email || doc.id, email: d.email || doc.id, trackingData: d.trackingData || {} });
    });
    return students;
  }

  function getVal(month, day, col) { return data[`m${month}_d${day}_${col}`] || ''; }
  async function setVal(month, day, col, val) {
    const key = `m${month}_d${day}_${col}`;
    if (data[key] === val) return;
    data[key] = val;
    await saveDataToFirebase(viewingStudentId || currentUserId, data);
    renderTable(); updateStats();
  }

  function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

  function makeCheckbox(month, day, col) {
    const wrap = document.createElement('div'); wrap.className = 'check-wrap';
    const box = document.createElement('div'); box.className = 'checkbox-custom' + (getVal(month, day, col) === '1' ? ' checked' : '');
    box.textContent = getVal(month, day, col) === '1' ? '✓' : '';
    box.onclick = async () => { const checked = box.classList.toggle('checked'); box.textContent = checked ? '✓' : ''; await setVal(month, day, col, checked ? '1' : ''); };
    wrap.appendChild(box); return wrap;
  }

  function makeStars(month, day) {
    const wrap = document.createElement('div'); wrap.className = 'star-rating';
    const current = parseInt(getVal(month, day, 'stars')) || 0;
    for (let i = 1; i <= 5; i++) {
      const star = document.createElement('span'); star.className = 'star' + (i <= current ? ' filled' : ''); star.textContent = '★';
      star.onclick = async () => { await setVal(month, day, 'stars', String(i)); renderTable(); };
      wrap.appendChild(star);
    } return wrap;
  }

  function makeHizbSelect(month, day) {
    const wrap = document.createElement('div'); wrap.className = 'hizb-wrap';
    const btn = document.createElement('button'); btn.className = 'hizb-btn';
    const update = () => {
      const vals = getVal(month, day, 'hizb') ? JSON.parse(getVal(month, day, 'hizb')) : [];
      btn.innerHTML = vals.length ? `<span class="hizb-selected">${vals.length} أحزاب</span>` : '<span>اختاري الحزب 🌸</span>';
    };
    update();
    const panel = document.createElement('div'); panel.className = 'hizb-panel hidden';
    const search = document.createElement('input'); search.className = 'hizb-search'; search.placeholder = '🔍 ابحثي...';
    const list = document.createElement('ul'); list.className = 'hizb-list';
    const build = (filter = '') => {
      list.innerHTML = '';
      AHZAB.forEach((h, idx) => {
        if (filter && !h.includes(filter)) return;
        const vals = getVal(month, day, 'hizb') ? JSON.parse(getVal(month, day, 'hizb')) : [];
        const li = document.createElement('li'); li.className = 'hizb-item' + (vals.includes(idx) ? ' selected' : '');
        li.innerHTML = `<span class="hizb-chk">${vals.includes(idx) ? '✓' : '○'}</span><span>${h}</span>`;
        li.onclick = async () => {
          let vals2 = getVal(month, day, 'hizb') ? JSON.parse(getVal(month, day, 'hizb')) : [];
          vals2 = vals2.includes(idx) ? vals2.filter(v => v !== idx) : [...vals2, idx].sort((a,b)=>a-b);
          await setVal(month, day, 'hizb', JSON.stringify(vals2));
          build(search.value); update();
        };
        list.appendChild(li);
      });
    };
    build();
    search.oninput = () => build(search.value);
    panel.appendChild(search); panel.appendChild(list);
    btn.onclick = (e) => { e.stopPropagation(); panel.classList.toggle('hidden'); };
    document.addEventListener('click', () => panel.classList.add('hidden'));
    wrap.appendChild(btn); wrap.appendChild(panel);
    return wrap;
  }

  function makeFieldWithDone(month, day, fieldCol, doneCol, type, placeholder) {
    const wrap = document.createElement('div'); wrap.className = 'field-done-wrap';
    let field;
    if (type === 'hizb') field = makeHizbSelect(month, day);
    else {
      field = document.createElement('textarea'); field.className = type === 'notes' ? 'notes-textarea' : 'wide-textarea';
      field.placeholder = placeholder; field.value = getVal(month, day, fieldCol); field.rows = 1;
      field.oninput = async () => { await setVal(month, day, fieldCol, field.value); autoResize(field); };
      setTimeout(() => autoResize(field), 10);
    }
    const doneRow = document.createElement('div'); doneRow.className = 'done-row';
    const isHafiz = doneCol === 'hafiz_done';
    const doneBox = document.createElement('div'); doneBox.className = 'done-check' + (isHafiz ? ' coffee-check' : '');
    const isDone = getVal(month, day, doneCol) === '1';
    if (isDone) doneBox.classList.add('done');
    doneBox.textContent = isDone ? (isHafiz ? '☕' : '✓') : (isHafiz ? '🤍' : '');
    const doneLbl = document.createElement('span'); doneLbl.className = 'done-lbl'; doneLbl.textContent = 'تم ✅';
    doneBox.onclick = async () => {
      const nowDone = doneBox.classList.toggle('done');
      doneBox.textContent = nowDone ? (isHafiz ? '☕' : '✓') : (isHafiz ? '🤍' : '');
      await setVal(month, day, doneCol, nowDone ? '1' : '');
    };
    doneLbl.onclick = () => doneBox.click();
    doneRow.appendChild(doneBox); doneRow.appendChild(doneLbl);
    wrap.appendChild(field); wrap.appendChild(doneRow);
    return wrap;
  }

  function getPages(totalDays) {
    return [
      { label: '🌸 الأيام ١–١٠', start: 1, end: 10 },
      { label: '💕 الأيام ١١–٢٠', start: 11, end: 20 },
      { label: `🎀 الأيام ٢١–${totalDays === 30 ? '٣٠' : '٢٩'}`, start: 21, end: totalDays }
    ];
  }

  function renderMonthTabs() {
    const container = document.getElementById('monthTabs');
    container.innerHTML = '';
    MONTHS.forEach((m, idx) => {
      const btn = document.createElement('button'); btn.className = 'month-tab-btn' + (idx === currentMonth ? ' active' : '');
      btn.innerHTML = `${m.emoji} ${m.name}`;
      btn.onclick = () => { currentMonth = idx; currentPage = 0; renderMonthTabs(); renderPageTabs(); renderTable(); };
      container.appendChild(btn);
    });
  }

  function renderPageTabs() {
    const container = document.getElementById('tabs');
    container.innerHTML = '';
    const pages = getPages(MONTHS[currentMonth].days);
    pages.forEach((page, idx) => {
      const btn = document.createElement('button'); btn.className = 'tab-btn' + (idx === currentPage ? ' active' : '');
      btn.textContent = page.label;
      btn.onclick = () => { currentPage = idx; renderPageTabs(); renderTable(); };
      container.appendChild(btn);
    });
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    const pages = getPages(MONTHS[currentMonth].days);
    const { start, end } = pages[currentPage];
    for (let day = start; day <= end; day++) {
      const tr = document.createElement('tr');
      const tdDay = document.createElement('td'); const circle = document.createElement('div'); circle.className = 'day-circle'; circle.textContent = day; tdDay.appendChild(circle); tr.appendChild(tdDay);
      const tdHafiz = document.createElement('td'); tdHafiz.classList.add('td-wide'); tdHafiz.appendChild(makeFieldWithDone(currentMonth, day, 'hafiz', 'hafiz_done', 'textarea', 'اكتبي ما حفظتِه... 🌸')); tr.appendChild(tdHafiz);
      const tdClose = document.createElement('td'); tdClose.appendChild(makeCheckbox(currentMonth, day, 'rev_close')); tr.appendChild(tdClose);
      const tdFar = document.createElement('td'); tdFar.classList.add('td-wide'); tdFar.appendChild(makeFieldWithDone(currentMonth, day, 'hizb', 'hizb_done', 'hizb', '')); tr.appendChild(tdFar);
      const tdGen = document.createElement('td'); tdGen.classList.add('td-wide'); tdGen.appendChild(makeFieldWithDone(currentMonth, day, 'rev_gen', 'rev_gen_done', 'textarea', 'اكتبي ملاحظات المراجعة... 💕')); tr.appendChild(tdGen);
      const tdNotes = document.createElement('td'); tdNotes.classList.add('td-notes'); tdNotes.appendChild(makeFieldWithDone(currentMonth, day, 'notes', 'notes_done', 'notes', 'اكتبي ملاحظات التجويد... ✏️')); tr.appendChild(tdNotes);
      const tdStars = document.createElement('td'); tdStars.appendChild(makeStars(currentMonth, day)); tr.appendChild(tdStars);
      const tdSheikh = document.createElement('td'); tdSheikh.appendChild(makeCheckbox(currentMonth, day, 'sheikh')); tr.appendChild(tdSheikh);
      tbody.appendChild(tr);
    }
  }

  function updateStats() {
    let done = 0, total = 0, starsSum = 0, starsCount = 0;
    MONTHS.forEach((m, mIdx) => {
      for (let d = 1; d <= m.days; d++) {
        ['rev_close', 'sheikh'].forEach(col => { total++; if (getVal(mIdx, d, col) === '1') done++; });
        const s = parseInt(getVal(mIdx, d, 'stars')); if (s > 0) { starsSum += s; starsCount++; }
      }
    });
    const pct = total ? Math.round((done/total)*100) : 0;
    const avg = starsCount ? (starsSum/starsCount).toFixed(1) : '—';
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = pct + '%';
    let mDone = 0, mTotal = 0;
    for (let d = 1; d <= MONTHS[currentMonth].days; d++) {
      ['rev_close', 'sheikh'].forEach(col => { mTotal++; if (getVal(currentMonth, d, col) === '1') mDone++; });
    }
    const mPct = mTotal ? Math.round((mDone/mTotal)*100) : 0;
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="stat-num">🌟 ${done}</div><div class="stat-lbl">إجمالي الإنجاز</div></div>
      <div class="stat-card"><div class="stat-num">💖 ${pct}%</div><div class="stat-lbl">نسبة السنة</div></div>
      <div class="stat-card"><div class="stat-num">📅 ${mPct}%</div><div class="stat-lbl">نسبة الشهر</div></div>
      <div class="stat-card"><div class="stat-num">⭐ ${avg}</div><div class="stat-lbl">متوسط التجويد</div></div>
    `;
  }

  async function showStudentView(userId, email, name) {
    currentUserId = userId; currentUserName = name; isAdmin = false; viewingStudentId = null;
    data = await loadDataFromFirebase(userId);
    document.getElementById('userNameDisplay').textContent = name || 'الطالبة';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    currentMonth = 0; currentPage = 0;
    renderMonthTabs(); renderPageTabs(); renderTable(); updateStats();
  }

  async function showAdminView() {
    isAdmin = true; currentUserId = null;
    const students = await loadAllStudents();
    document.getElementById('userNameDisplay').textContent = 'المشرفة';
    const panel = document.getElementById('adminPanel'); panel.style.display = 'block';
    const select = document.getElementById('studentSelect');
    select.innerHTML = '<option value="">-- اختر طالباً --</option>';
    students.forEach(s => { const opt = document.createElement('option'); opt.value = s.id; opt.textContent = `${s.name}`; select.appendChild(opt); });
    select.onchange = async () => {
      if (select.value) {
        const student = students.find(s => s.id === select.value);
        if (student) {
          viewingStudentId = student.id; data = student.trackingData || {};
          document.getElementById('userNameDisplay').textContent = student.name;
          currentMonth = 0; currentPage = 0;
          renderMonthTabs(); renderPageTabs(); renderTable(); updateStats();
          document.getElementById('adminMsg').innerHTML = `👩‍🏫 تعرض بيانات: ${student.name}`;
        }
      } else { viewingStudentId = null; document.getElementById('userNameDisplay').textContent = 'المشرفة'; if (students.length) { const first = students[0]; viewingStudentId = first.id; data = first.trackingData || {}; renderTable(); updateStats(); } }
    };
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    if (students.length) { select.value = students[0].id; select.dispatchEvent(new Event('change')); }
  }

  // ==================== التسجيل والدخول ====================
  const authScreen = document.getElementById('authScreen');
  const appScreen = document.getElementById('appScreen');
  const loginBtn = document.getElementById('loginBtn');
  const signupBtn = document.getElementById('signupBtn');
  const logoutMain = document.getElementById('logoutMainBtn');
  const logoutAdmin = document.getElementById('logoutBtnAdmin');
  const emailInput = document.getElementById('loginEmail');
  const passInput = document.getElementById('loginPassword');
  const nameInput = document.getElementById('signupName');
  const authMsg = document.getElementById('authMsg');

  loginBtn.onclick = async () => {
    authMsg.textContent = 'جاري الدخول...';
    try {
      await signInWithEmailAndPassword(auth, emailInput.value, passInput.value);
      authMsg.textContent = '';
    } catch(e) { authMsg.textContent = '⚠️ ' + e.message; }
  };

  signupBtn.onclick = async () => {
    if (!nameInput.value.trim()) { authMsg.textContent = '⚠️ الرجاء إدخال الاسم'; return; }
    if (passInput.value.length < 6) { authMsg.textContent = '⚠️ كلمة المرور 6 أحرف على الأقل'; return; }
    authMsg.textContent = 'جاري إنشاء الحساب...';
    try {
      const userCred = await createUserWithEmailAndPassword(auth, emailInput.value, passInput.value);
      // حفظ الاسم في Firestore بعد إنشاء الحساب
      await saveNameToFirestore(userCred.user.uid, nameInput.value.trim());
      authMsg.textContent = '✅ تم إنشاء الحساب بنجاح! يمكنك الدخول الآن.';
      // مسح حقل الاسم بعد النجاح
      nameInput.value = '';
    } catch(e) { 
      if (e.code === 'auth/email-already-in-use') authMsg.textContent = '⚠️ هذا البريد مسجل بالفعل، جربي تسجيل الدخول';
      else authMsg.textContent = '⚠️ ' + e.message;
    }
  };

  logoutMain.onclick = () => signOut(auth);
  if (logoutAdmin) logoutAdmin.onclick = () => signOut(auth);

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const email = user.email;
      let userName = await getUserName(user.uid);
      const ADMIN_EMAIL = "rahmakishk575@gmail.com";
      if (email === ADMIN_EMAIL) showAdminView();
      else showStudentView(user.uid, email, userName);
    } else {
      authScreen.style.display = 'flex';
      appScreen.style.display = 'none';
    }
  });
</script>
</body>
</html>
